name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm install

      - name: Build Next.js
        run: |
          cd apps/frontend
          npm run build

      - name: Setup Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: |
          cd apps/frontend
          wrangler pages deploy .next/static --project-name=image-background-remover
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
